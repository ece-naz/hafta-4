<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBoost - Emoji Şarkı Oyunu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Arka Plan Efektleri */
        .bg-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            filter: blur(40px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, 50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .emoji-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }

        .emoji-item {
            font-size: 3.5rem;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .emoji-item:hover {
            transform: scale(1.15) translateY(-10px);
            background: #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .emoji-item.active {
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Sonuç Kartı */
        .result-card {
            display: none;
            background: white;
            border-radius: 25px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mood-emoji-display {
            font-size: 4rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .quote {
            font-size: 1.2rem;
            color: #333;
            font-weight: 600;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .song-info {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
        }

        .song-title {
            font-weight: 800;
            color: #1e293b;
            font-size: 1.1rem;
        }

        .song-artist {
            color: #64748b;
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 99px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-youtube {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-youtube:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Çıkış Ekranı */
        #exit-screen {
            display: none;
            text-align: center;
        }

        .rating-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .rating-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .rating-btn:hover, .rating-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .finish-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.7;
            padding: 8px 15px;
            font-size: 0.8rem;
        }

        .finish-btn:hover {
            opacity: 1;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
            .emoji-item { width: 70px; height: 70px; font-size: 2.5rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="bg-circles">
        <div class="circle" style="width: 400px; height: 400px; top: -100px; right: -100px; background: rgba(99, 102, 241, 0.15);"></div>
        <div class="circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px; background: rgba(168, 85, 247, 0.15);"></div>
    </div>

    <div class="container" id="main-container">
        <div id="game-screen">
            <h1>MoodBoost</h1>
            <p class="subtitle">Bugün kendini nasıl hissediyorsun? Bir emoji seç ve enerjini değiştir!</p>

            <div class="emoji-grid">
                <div class="emoji-item" onclick="selectMood('happy', this)" title="Harika">😊</div>
                <div class="emoji-item" onclick="selectMood('sad', this)" title="Hüzünlü">😔</div>
                <div class="emoji-item" onclick="selectMood('energetic', this)" title="Enerjik">⚡</div>
                <div class="emoji-item" onclick="selectMood('chill', this)" title="Sakin">🧘</div>
                <div class="emoji-item" onclick="selectMood('romantic', this)" title="Romantik">❤️</div>
            </div>

            <div id="result-card" class="result-card">
                <div class="mood-emoji-display" id="display-emoji">😊</div>
                <div class="quote" id="display-quote">"Her yeni gün, yeni bir başlangıçtır."</div>
                
                <div class="song-info">
                    <p style="font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Müzik Önerisi</p>
                    <div class="song-title" id="display-song-title">Ele Güne Karşı</div>
                    <div class="song-artist" id="display-song-artist">MFÖ</div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="refreshContent()">
                        <span>🔄</span> Değiştir
                    </button>
                    <a href="#" target="_blank" class="btn btn-youtube" id="display-youtube">
                        <span>▶️</span> YouTube
                    </a>
                </div>
            </div>

            <button class="btn finish-btn" onclick="showExit()">
                🚪 Uygulamadan Çık
            </button>
        </div>

        <div id="exit-screen">
            <h1 id="exit-title">Harika Bir Seçim!</h1>
            <p class="subtitle" id="exit-question">Kendini şimdi biraz daha iyi hissediyor musun?</p>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="setFeel(true)">Evet, Çok Daha İyiyim!</button>
                <button class="btn" style="border: 1px solid #ddd;" onclick="setFeel(false)">Fena Sayılmam</button>
            </div>

            <div id="rating-section" style="display: none; margin-top: 30px; animation: slideUp 0.5s;">
                <p>Bugüne kaç puan verirsin?</p>
                <div class="rating-grid">
                    <button class="rating-btn" onclick="selectRate(this)">1</button>
                    <button class="rating-btn" onclick="selectRate(this)">2</button>
                    <button class="rating-btn" onclick="selectRate(this)">3</button>
                    <button class="rating-btn" onclick="selectRate(this)">4</button>
                    <button class="rating-btn" onclick="selectRate(this)">5</button>
                    <button class="rating-btn" onclick="selectRate(this)">6</button>
                    <button class="rating-btn" onclick="selectRate(this)">7</button>
                    <button class="rating-btn" onclick="selectRate(this)">8</button>
                    <button class="rating-btn" onclick="selectRate(this)">9</button>
                    <button class="rating-btn" onclick="selectRate(this)">10</button>
                </div>
                <button class="btn btn-primary" onclick="finalFinish()">Günü Kapat</button>
            </div>
        </div>
    </div>

    <script>
        const moodData = {
            happy: {
                bg: "linear-gradient(135deg, #fef9c3 0%, #fef08a 100%)",
                quotes: [
                    "Bugün parlıyorsun, engel tanıma!",
                    "Gülümsemen dünyayı güzelleştiriyor.",
                    "Mutluluk bir seçimdir, sen bugün en iyisini seçtin.",
                    "Senin enerjin bulaşıcı, herkesi mutlu ediyorsun!"
                ],
                songs: [
                    { title: "Ele Güne Karşı", artist: "MFÖ", link: "https://www.youtube.com/watch?v=RIsLqY2mX9U" },
                    { title: "Keyfi Yolunda", artist: "Yalın", link: "https://www.youtube.com/watch?v=F0p7vW3X8XU" },
                    { title: "Gülümse", artist: "Sezen Aksu", link: "https://www.youtube.com/watch?v=0hK2g7X7u7s" }
                ]
            },
            sad: {
                bg: "linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%)",
                quotes: [
                    "Her fırtınanın ardından güneş mutlaka doğar.",
                    "Kendine karşı nazik ol, sen çok değerlisin.",
                    "Bugün sadece bir gündü, yarın taptaze bir başlangıç.",
                    "Hissedilen her şey geçicidir, güçlenerek çıkacaksın."
                ],
                songs: [
                    { title: "İyileşiyorum", artist: "Sertab Erener", link: "https://www.youtube.com/watch?v=68E6XlY7f88" },
                    { title: "Aşk", artist: "Şebnem Ferah", link: "https://www.youtube.com/watch?v=9g0H_C8vHGo" },
                    { title: "Mazeretim Var", artist: "MFÖ", link: "https://www.youtube.com/watch?v=7uNf1P8M5-g" }
                ]
            },
            energetic: {
                bg: "linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%)",
                quotes: [
                    "Durdurulamaz bir güçsün, harekete geç!",
                    "Bugün dünyayı değiştirmeye ne dersin?",
                    "Potansiyelin sınırsız, sınırlarını zorla.",
                    "Ateşinle herkesi büyüleyebilirsin!"
                ],
                songs: [
                    { title: "Kafama Göre", artist: "Athena", link: "https://www.youtube.com/watch?v=L2GzFfAn72c" },
                    { title: "Cambaz", artist: "Mor ve Ötesi", link: "https://www.youtube.com/watch?v=MInZ6s8QpQ4" },
                    { title: "Bir Kadın Çizeceksin", artist: "Manga", link: "https://www.youtube.com/watch?v=8S_r70qZ_94" }
                ]
            },
            chill: {
                bg: "linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%)",
                quotes: [
                    "Sakinlik zihnin en büyük gücüdür.",
                    "Derin bir nefes al ve anın tadını çıkar.",
                    "Huzur senin içinde, onu keşfetmeni bekliyor.",
                    "Her şeyin bir zamanı var, akışa güven."
                ],
                songs: [
                    { title: "Sakin Ol", artist: "Sertab Erener", link: "https://www.youtube.com/watch?v=J_h8MhM_e2M" },
                    { title: "Yollarda", artist: "Teoman", link: "https://www.youtube.com/watch?v=nO3_7fV8z6Q" },
                    { title: "Sende Bir Şeyler Var", artist: "Adamlar", link: "https://www.youtube.com/watch?v=6P6M6DqV36A" }
                ]
            },
            romantic: {
                bg: "linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%)",
                quotes: [
                    "Sevgi paylaştıkça çoğalan tek mucizedir.",
                    "Kalbinin sesini dinle, en doğru yolu o gösterir.",
                    "Hayat birini sevdikçe güzelleşir.",
                    "Ruhun bugün sevgi dolu, bunu yansıt!"
                ],
                songs: [
                    { title: "İyi Ki Varsın", artist: "Yalın", link: "https://www.youtube.com/watch?v=G3M5XnI-O_s" },
                    { title: "Tencere Kapak", artist: "Kenan Doğulu", link: "https://www.youtube.com/watch?v=9g0H_C8vHGo" },
                    { title: "Kalp Hanım", artist: "Kalben", link: "https://www.youtube.com/watch?v=68M6XlY7f88" }
                ]
            }
        };

        let currentMood = null;

        function selectMood(mood, element) {
            currentMood = mood;
            const data = moodData[mood];
            
            // UI Güncelleme
            document.querySelectorAll('.emoji-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            document.body.style.background = data.bg;
            
            const card = document.getElementById('result-card');
            card.style.display = 'block';
            
            document.getElementById('display-emoji').textContent = element.textContent;
            
            refreshContent();
        }

        function refreshContent() {
            if (!currentMood) return;
            const data = moodData[currentMood];
            
            // Rastgele seçimler
            const randomQuote = data.quotes[Math.floor(Math.random() * data.quotes.length)];
            const randomSong = data.songs[Math.floor(Math.random() * data.songs.length)];
            
            // Animasyonla içerik değiştirme
            const quoteEl = document.getElementById('display-quote');
            const songTitleEl = document.getElementById('display-song-title');
            const songArtistEl = document.getElementById('display-song-artist');
            const ytLink = document.getElementById('display-youtube');

            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteEl.textContent = `"${randomQuote}"`;
                songTitleEl.textContent = randomSong.title;
                songArtistEl.textContent = randomSong.artist;
                ytLink.href = randomSong.link;
                quoteEl.style.opacity = 1;
                quoteEl.style.transition = 'opacity 0.4s';
            }, 200);
        }

        function showExit() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('exit-screen').style.display = 'block';
        }

        function setFeel(better) {
            const subtitle = document.getElementById('exit-question');
            const exitTitle = document.getElementById('exit-title');
            
            if (better) {
                exitTitle.textContent = "Harika! Enerjin Değişti ✨";
                subtitle.textContent = "Bunu duyduğumuza çok sevindik. Bugün senin için parlasın!";
            } else {
                exitTitle.textContent = "Yarın Yepyeni Bir Gün 🌱";
                subtitle.textContent = "Umarız bu müzikler en azından biraz huzur vermiştir.";
            }
            
            document.querySelector('#exit-screen .actions').style.display = 'none';
            document.getElementById('rating-section').style.display = 'block';
        }

        function selectRate(btn) {
            document.querySelectorAll('.rating-btn').forEach(el => el.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function finalFinish() {
            document.getElementById('exit-screen').innerHTML = `
                <h1 style="font-size: 3rem;">Teşekkürler! ❤️</h1>
                <p class="subtitle">Bu uygulama bugün senin için oradaydı. Tekrar görüşmek üzere!</p>
                <button class="btn btn-primary" onclick="location.reload()">Başa Dön</button>
            `;
        }
    </script>
</body>
</html>
