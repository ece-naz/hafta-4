<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaratıcı Dünya | Hoş Geldiniz</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

:root {
  --primary: #00BFFF;   /* Parlak Mavi */
  --secondary: #000080; /* Lacivert */
  --accent: #8B0000;    /* Bordo */
  --bg: #050510;        /* Koyu Lacivert Arkaplan */
  --text: #ffffff;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: none; /* We'll use a custom butterfly cursor */
}

body {
  font-family: 'Outfit', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Animated Mesh Background */
.bg-mesh {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(circle at 50% 50%, var(--secondary) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, var(--primary) 0%, transparent 40%),
              radial-gradient(circle at 20% 80%, var(--accent) 0%, transparent 40%);
  filter: blur(80px);
  opacity: 0.5;
  animation: mesh-move 20s ease-in-out infinite alternate;
}

/* Flat Main Content Container Adjustments */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 2rem;
  z-index: 10;
  max-width: 800px;
  width: 95%;
  animation: fade-in 1.5s ease-out;
}

/* Profile Picture Section */
.profile-section {
  margin-bottom: 1.5rem;
}

.profile-pic {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--primary);
  box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: spin 10s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.profile-pic:hover {
  animation-play-state: paused;
  transform: scale(1.1);
  box-shadow: 0 0 40px rgba(0, 191, 255, 0.9);
}

.main-name {
  font-size: 3.5rem;
  font-weight: 700;
  margin-top: 1rem;
  margin-bottom: 0.2rem;
  background: linear-gradient(45deg, var(--primary), #ffffff);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

.subtitle {
  font-size: 1.2rem;
  color: var(--primary);
  margin-top: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.greeting-text {
  font-size: 1.2rem;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 2.5rem;
  line-height: 1.6;
  max-width: 600px;
}

/* Button Group */
.button-group {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  width: 100%;
  max-width: 500px;
}

/* Creative Link Button */
.cta-button {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem 2rem;
  font-size: 1.1rem;
  font-weight: 600;
  text-decoration: none;
  color: white;
  border-radius: 100px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.primary-hero-btn {
  background: linear-gradient(45deg, var(--accent), var(--secondary));
  padding: 1.5rem 3rem;
  font-size: 1.4rem;
  box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
  width: 100%;
}

.primary-hero-btn:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 20px 40px rgba(139, 0, 0, 0.6),
              0 0 30px var(--primary);
}

.cta-button::after {
  content: '';
  display: none; /* Removed global rocket emoji, added inline in html */
}

/* Secondary Buttons */
.secondary-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  box-shadow: none;
}

.secondary-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
  border-color: rgba(255, 255, 255, 0.2);
}

/* Custom Butterfly Cursor Effects */
.butterfly {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 24px;
  transform-origin: center;
  transition: transform 0.1s ease-out;
}

.butterfly-trail {
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  font-size: 16px;
  animation: fly-away 1s ease-out forwards;
}

.giant-butterfly {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  font-size: 80px;
  animation: giant-fly-away 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

@keyframes fly-away {
  0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: scale(0.5) translateY(-50px) rotate(45deg); opacity: 0; }
}

@keyframes giant-fly-away {
  0% { transform: scale(0.5) translate(0, 0) rotate(0deg); opacity: 1; }
  100% { transform: scale(3) translate(100vw, -100vh) rotate(720deg); opacity: 0; }
}

/* Floating Messages */
.floating-message {
  position: fixed;
  color: var(--primary);
  font-size: 1.5rem;
  font-weight: 600;
  pointer-events: none;
  z-index: 10001;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
  animation: float-up 2s ease-out forwards;
}

@keyframes float-up {
  0% { transform: translateY(0) scale(0.5); opacity: 0; }
  20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
  100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

@keyframes fade-in {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 600px) {
  .main-name { font-size: 2.5rem; }
  .container { padding: 1rem; }
  .primary-hero-btn { font-size: 1.1rem; padding: 1rem 2rem; }
}
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-mesh"></div>

    <!-- Main Content -->
    <div class="container">
        
        <div class="profile-section">
            <a href="https://github.com/ece-naz" target="_blank">
                <img src="https://github.com/ece-naz.png" alt="Ece Naz Aktürk Profile" class="profile-pic">
            </a>
            <h1 class="main-name">Ece Naz Aktürk</h1>
            <h2 class="subtitle">MAKÜ Veri Bilimi ve Analitiği</h2>
        </div>

        <p class="greeting-text">
            Dijital dünyanın renkli ve interaktif yüzüne hoş geldiniz. 
            Burada hayal gücü ile teknolojinin buluştuğu küçük bir evrene adım atacaksınız.
            Ece Naz Aktürk'ün projelerini keşfedin!
        </p>
        
        <div class="button-group">
            <a href="emoji_sarki.html" class="cta-button primary-hero-btn">
                Emoji Şarkısı Macerası 🚀
            </a>
            
            <a href="https://github.com/ece-naz/3.hafta/blob/main/normal_dagilim_grafigi.png" target="_blank" class="cta-button secondary-btn">
                📊 Görsel
            </a>
            
            <a href="https://github.com/ece-naz/3.hafta/blob/main/normal_dagilimli_veri.csv" target="_blank" class="cta-button secondary-btn">
                📄 Veri Seti
            </a>
        </div>
        </div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
  // Create the main butterfly cursor
  const mainButterfly = document.createElement('div');
  mainButterfly.className = 'butterfly';
  mainButterfly.innerText = '🦋';
  document.body.appendChild(mainButterfly);

  let mouseX = 0;
  let mouseY = 0;

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    // Main butterfly follows mouse
    // Offset slightly so we can click things under the mouse
    mainButterfly.style.left = `${mouseX + 10}px`;
    mainButterfly.style.top = `${mouseY + 10}px`;

    // Only create trail occasionally to not overwhelm the DOM
    if (Math.random() > 0.8) {
      createTrail(mouseX, mouseY);
    }
  });

  function createTrail(x, y) {
    const trail = document.createElement('div');
    trail.className = 'butterfly-trail';
    trail.innerText = '🦋';
    trail.style.left = `${x}px`;
    trail.style.top = `${y}px`;
    
    document.body.appendChild(trail);

    setTimeout(() => {
      trail.remove();
    }, 1000); // matches the animation duration
  }

  // Giant butterfly on button click
  const buttons = document.querySelectorAll('.cta-button');
  buttons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      // Don't prevent default right away so navigation still happens
      // But we can spawn a giant butterfly from the click location!
      spawnGiantButterfly(e.clientX, e.clientY);
    });
  });

  function spawnGiantButterfly(x, y) {
    const giant = document.createElement('div');
    giant.className = 'giant-butterfly';
    giant.innerText = '🦋';
    giant.style.left = `${x}px`;
    giant.style.top = `${y}px`;
    
    document.body.appendChild(giant);

    setTimeout(() => {
      giant.remove();
    }, 2000); // matches giant-fly-away animation duration
  }

  // Floating nice messages on empty space click
  const messages = [
    "Hoş Geldiniz! ✨",
    "Gününüz güzel geçsin! 🌸",
    "Harika projeler sizi bekliyor! 🚀",
    "Veri bilimi çok eğlencelidir! 📊",
    "Kodlamaya devam! 💻",
    "İlham dolu dokunuşlar! 🦋",
    "Gülümseyin! 😊"
  ];

  document.addEventListener('click', (e) => {
    // Check if the click was on a button or the profile section
    if (e.target.closest('.cta-button') || e.target.closest('.profile-section')) {
      return; 
    }

    const msgElement = document.createElement('div');
    msgElement.className = 'floating-message';
    msgElement.innerText = messages[Math.floor(Math.random() * messages.length)];
    msgElement.style.left = `${e.clientX}px`;
    msgElement.style.top = `${e.clientY}px`;
    
    document.body.appendChild(msgElement);

    setTimeout(() => {
      msgElement.remove();
    }, 2000); // matches float-up animation duration
  });
});
    </script>
</body>
</html>
